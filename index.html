<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة الاجتماعيات - التاسعة إعدادي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green: #58cc02;
      --green-dark: #46a302;
      --green-soft: #e5ffd3;
      --blue: #1cb0f6;
      --blue-dark: #1387bd;
      --blue-soft: #e2f5ff;
      --yellow: #ffc800;
      --yellow-soft: #fff5c4;
      --red: #ff4b4b;
      --red-dark: #d93636;
      --red-soft: #ffe4e4;
      --purple: #ce82ff;
      --purple-soft: #f4e3ff;
      --orange: #ff9600;
      --bg: #f4fbff;
      --card: #ffffff;
      --card-soft: #f1f9ff;
      --text: #1f2d3d;
      --muted: #64748b;
      --border: #d8e9f5;
      --shadow: 0 12px 0 rgba(15, 23, 42, 0.08), 0 20px 42px rgba(15, 23, 42, 0.12);
      --mini-shadow: 0 7px 0 rgba(15, 23, 42, 0.10);
      --radius: 24px;
    }

    body.dark {
      --bg: #0f172a;
      --card: #172033;
      --card-soft: #111c30;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: rgba(255,255,255,0.14);
      --green-soft: rgba(88,204,2,0.16);
      --blue-soft: rgba(28,176,246,0.16);
      --yellow-soft: rgba(255,200,0,0.16);
      --red-soft: rgba(255,75,75,0.16);
      --purple-soft: rgba(206,130,255,0.16);
      --shadow: 0 12px 0 rgba(0, 0, 0, 0.28), 0 20px 42px rgba(0, 0, 0, 0.34);
      --mini-shadow: 0 7px 0 rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Cairo", "Tajawal", system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(28,176,246,0.20), transparent 30%),
        radial-gradient(circle at 90% 12%, rgba(88,204,2,0.18), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(206,130,255,0.14), transparent 35%),
        var(--bg);
      transition: background 0.35s ease, color 0.35s ease;
      overflow-x: hidden;
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      font-weight: 900;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .app {
      width: min(1160px, 94vw);
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
      animation: slideDown 0.55s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mascot {
      width: 66px;
      height: 66px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      background: linear-gradient(145deg, var(--green), #9be600);
      box-shadow: var(--mini-shadow);
      animation: mascotFloat 3s ease-in-out infinite;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.55rem);
      line-height: 1.15;
      font-weight: 900;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: var(--card);
      color: var(--text);
      border: 2px solid var(--border);
      box-shadow: var(--mini-shadow);
      font-size: 1.25rem;
      transition: 0.18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.03);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      animation: fadeUp 0.65s ease both;
    }

    .progress-shell {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 8px;
      box-shadow: var(--mini-shadow);
    }

    .progress-bar {
      height: 20px;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
      transition: width 0.45s cubic-bezier(.18,.9,.3,1);
    }

    .hud-pill {
      background: var(--card);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      box-shadow: var(--mini-shadow);
      font-size: 1.02rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .screen {
      display: none;
      min-height: 620px;
    }

    .screen.active {
      display: block;
      animation: fadeSlide 0.5s cubic-bezier(.18,.9,.3,1) both;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 42px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(88,204,2,0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(28,176,246,0.11), transparent 30%);
      pointer-events: none;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: center;
    }

    .hero h2,
    .lesson-title,
    .result-title {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.7px;
    }

    .hero p,
    .result-text {
      margin: 0;
      font-size: clamp(1.22rem, 2.3vw, 1.65rem);
      line-height: 2;
      font-weight: 800;
    }

    .hero-art {
      min-height: 330px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 36%),
        linear-gradient(145deg, #baff73, #75d8ff);
      display: grid;
      place-items: center;
      font-size: clamp(5rem, 12vw, 9rem);
      box-shadow: var(--shadow);
      animation: float 3.2s ease-in-out infinite;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue-soft);
      color: var(--blue-dark);
      border: 2px solid rgba(28,176,246,0.28);
      border-radius: 999px;
      padding: 8px 15px;
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    body.dark .pill {
      color: #7dd3fc;
    }

    .rules-box {
      margin-top: 20px;
      background: var(--yellow-soft);
      border: 2px solid rgba(255,200,0,0.42);
      border-radius: 22px;
      padding: 18px;
      line-height: 1.8;
      font-weight: 900;
      text-align: right;
      direction: rtl;
    }

    .lesson-map {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .lesson-node {
      min-height: 162px;
      border-radius: 22px;
      padding: 18px;
      border: 2px solid var(--border);
      background: var(--card-soft);
      color: var(--text);
      box-shadow: var(--mini-shadow);
      transition: 0.18s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    .lesson-node.unlocked {
      background: linear-gradient(145deg, var(--green-soft), var(--blue-soft));
    }

    .lesson-node.locked {
      opacity: 0.52;
      filter: grayscale(0.45);
    }

    .lesson-node.unlocked:hover {
      transform: translateY(-5px);
      filter: brightness(1.02);
    }

    .node-icon {
      font-size: 2.2rem;
    }

    .node-title {
      font-size: 1.04rem;
      line-height: 1.45;
      font-weight: 900;
    }

    .node-status {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 900;
    }

    .learning-card {
      margin-top: 22px;
      min-height: 330px;
      border-radius: 24px;
      background: var(--card-soft);
      border: 2px solid var(--border);
      padding: clamp(22px, 4vw, 38px);
      box-shadow: inset 0 -5px 0 rgba(30,41,59,0.05);
      animation: fadeSlide 0.45s ease both;
      text-align: right;
      direction: rtl;
    }

    .learning-card h3 {
      margin: 0 0 20px;
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      font-weight: 900;
      color: var(--blue-dark);
      text-align: right;
    }

    body.dark .learning-card h3 {
      color: #7dd3fc;
    }

    .learning-card ul {
      margin: 0;
      padding: 0 28px 0 0;
      text-align: right;
      direction: rtl;
    }

    .learning-card li {
      margin: 0 0 16px;
      font-size: clamp(1.2rem, 2vw, 1.5rem);
      line-height: 2;
      font-weight: 800;
      text-align: right;
      direction: rtl;
    }

    .learning-card li::marker {
      color: var(--green);
      font-size: 1.25em;
    }

    .learning-card strong {
      font-weight: 900;
      color: var(--green-dark);
    }

    body.dark .learning-card strong {
      color: #a3e635;
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .mini-info {
      color: var(--muted);
      font-size: 1.03rem;
      font-weight: 900;
    }

    .btn {
      min-width: 170px;
      border-radius: 18px;
      padding: 16px 24px;
      color: #ffffff;
      background: var(--green);
      box-shadow: 0 7px 0 var(--green-dark);
      font-size: 1.12rem;
      transition: 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .btn.secondary {
      background: var(--blue);
      box-shadow: 0 7px 0 var(--blue-dark);
    }

    .btn.red {
      background: var(--red);
      box-shadow: 0 7px 0 var(--red-dark);
    }

    .btn.gray {
      background: #94a3b8;
      box-shadow: 0 7px 0 #64748b;
    }

    .quiz-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 38px);
      animation: fadeSlide 0.45s ease both;
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .question-title {
      margin: 0 0 22px;
      font-size: clamp(1.55rem, 3.2vw, 2.5rem);
      line-height: 1.35;
      font-weight: 900;
      text-align: right;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .answer,
    .match-item {
      background: var(--card-soft);
      border: 3px solid var(--border);
      color: var(--text);
      border-radius: 18px;
      box-shadow: 0 6px 0 rgba(30,41,59,0.08);
      padding: 18px;
      min-height: 74px;
      font-size: 1.12rem;
      text-align: right;
      direction: rtl;
      transition: 0.15s ease;
    }

    .answer:hover,
    .match-item:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    .answer.correct,
    .match-item.done {
      border-color: var(--green);
      background: var(--green-soft);
      animation: successBounce 0.45s ease;
    }

    .answer.wrong,
    .match-item.wrong {
      border-color: var(--red);
      background: var(--red-soft);
      animation: errorShake 0.42s ease;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 16px;
    }

    .match-col {
      display: grid;
      gap: 12px;
    }

    .match-col-title {
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 900;
      margin-bottom: 2px;
      text-align: center;
    }

    .match-item {
      text-align: center;
    }

    .match-item.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      transform: translateY(-2px) scale(1.01);
    }

    .match-item.done {
      opacity: 0.75;
      pointer-events: none;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.7;
      text-align: right;
      direction: rtl;
    }

    .feedback.show {
      display: block;
      animation: fadeUp 0.25s ease both;
    }

    .feedback.good {
      color: var(--green-dark);
      background: var(--green-soft);
      border: 2px solid rgba(88,204,2,0.35);
    }

    .feedback.bad {
      color: var(--red-dark);
      background: var(--red-soft);
      border: 2px solid rgba(255,75,75,0.35);
    }

    body.dark .feedback.good {
      color: #a3e635;
    }

    body.dark .feedback.bad {
      color: #fca5a5;
    }

    .result {
      text-align: center;
    }

    .result-emoji {
      font-size: clamp(5rem, 13vw, 9rem);
      margin-bottom: 12px;
      animation: successBounce 1.1s ease infinite;
    }

    .big-score {
      width: max-content;
      min-width: 180px;
      margin: 22px auto;
      border-radius: 30px;
      padding: 14px 26px;
      color: white;
      background: linear-gradient(145deg, var(--green), #a4e900);
      box-shadow: 0 10px 0 var(--green-dark);
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 900;
    }

    .big-score.fail {
      background: linear-gradient(145deg, var(--red), #ff8686);
      box-shadow: 0 10px 0 var(--red-dark);
    }

    .confetti {
      position: fixed;
      z-index: 100;
      top: -25px;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      pointer-events: none;
      animation: confettiFall 1.9s linear forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(24px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes mascotFloat {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-6px) rotate(3deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(2deg); }
      50% { transform: translateY(-12px) rotate(-2deg); }
    }

    @keyframes successBounce {
      0%, 100% { transform: scale(1); }
      38% { transform: scale(1.09); }
      62% { transform: scale(0.97); }
    }

    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    @keyframes confettiFall {
      to { opacity: 0; transform: translateY(108vh) rotate(720deg); }
    }

    @media (max-width: 900px) {
      body { font-size: 1.08rem; }

      .topbar {
        align-items: flex-start;
      }

      .brand {
        align-items: flex-start;
      }

      .mascot {
        width: 56px;
        height: 56px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 220px;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .lesson-map {
        grid-template-columns: 1fr;
      }

      .answers,
      .match-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mascot">🦉</div>
        <div>
          <h1>رحلة التفوق في الاجتماعيات</h1>
          <p>8 دروس كاملة + اختبارات تفاعلية + Final Boss</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="soundBtn" title="تشغيل/إيقاف الصوت">🔊</button>
        <button class="icon-btn" id="themeBtn" title="الوضع الليلي/النهاري">🌙</button>
      </div>
    </header>

    <section class="hud">
      <div class="progress-shell">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="hud-pill" id="hudText">ابدأ الرحلة</div>
    </section>

    <main id="app"></main>
  </div>

  <audio id="audioCorrect" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
  <audio id="audioWrong" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/946/946-preview.mp3"></audio>
  <audio id="audioComplete" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
  <audio id="audioClick" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

  <script>
    const lessons = [
      {
        id: 1,
        icon: "📜",
        title: "التاريخ - الكفاح من أجل الاستقلال وإتمام الوحدة الترابية",
        cards: [
          {
            title: "مراحل الاحتلال والمقاومة المسلحة",
            items: [
              "مراحل الاحتلال: قبل 1907 (سبتة ومليلية)، 1907-1912 (الشرق، الدار البيضاء)، 1912-1914 (مراكش)، 1914-1926 (الأطلس والريف)، 1931-1934 (الجنوب).",
              "أحمد الهيبة: انهزم في معركة سيدي بوعثمان سنة 1912م ضد فرنسا.",
              "موحى أحمو الزياني: انتصر في معركة الهري سنة 1914م.",
              "محمد بن عبد الكريم الخطابي: انتصر في معركة أنوال سنة 1921م.",
              "عسو أو بسلام: استسلم بعد هزيمته بمعركة بوكافر سنة 1933م."
            ]
          },
          {
            title: "الحركة الوطنية واستكمال الوحدة الترابية",
            items: [
              "الحركة الوطنية: المطالبة بالإصلاحات خلال الثلاثينيات، وتحولت إلى المطالبة بالاستقلال بتقديم وثيقة 11 يناير 1944م.",
              "الوحدة الترابية: 1956 (طنجة)، 1958 (طرفاية)، 1969 (سيدي إفني)، 1975 (الساقية الحمراء بعد المسيرة الخضراء)، 1979 (واد الذهب)."
            ]
          },
          {
            title: "المصطلحات",
            terms: [
              ["الظهير البربري", "مرسوم قانون أصدرته فرنسا في 16 ماي 1930 للتفريق بين الأمازيغ والعرب في القضاء."],
              ["الحركة الوطنية", "حركة سياسية ظهرت سنة 1930م للدفاع عن استقلال المغرب."],
              ["الاستقلال", "تحرر الدولة المستعمرة من سيطرة الدولة المستعمرة."],
              ["المقاومة", "رد فعل قام به المغاربة ضد الاستعمار وهي إما مسلحة أو سياسية."],
              ["إتمام الوحدة الترابية", "استرجاع المغرب لمناطقه الجنوبية."]
            ]
          }
        ],
        questions: [
          { type: "mcq", prompt: "متى تم تقديم وثيقة المطالبة بالاستقلال؟", answers: ["11 يناير 1944م", "16 ماي 1930", "1956", "1979"], correct: "11 يناير 1944م" },

          { type: "mcq", prompt: "ما خطوات إعداد البرنامج الإعلامي؟", answers: ["مرحلة التصور ومرحلة التخطيط", "الوصف والتفسير والتعميم", "الحوار والتفاوض", "تكوين أول حكومة"], correct: "مرحلة التصور ومرحلة التخطيط" },
          { type: "match", prompt: "اربط المصطلح بتعريفه:", pairs: [["البرامج الإعلامية", "هي البرامج السمعية والبصرية والمكتوبة الهادفة الى ربط الاتصال بالجمهور."], ["قيم المواطنة", "معان ومفاهيم تقوم عليها المواطنة النشيطة، تعكس الوعي بالحق والوجب."], ["البرهنة", "مجموعة أفكار على شكل حجج نريد بها إقناع جهة معينة بتبني موقف أو سلوك معين."]] },
          { type: "mcq", prompt: "ما معنى البرهنة؟", answers: ["مجموعة أفكار على شكل حجج نريد بها إقناع جهة معينة بتبني موقف أو سلوك معين.", "بلد استطاع تحسين مؤشراته الاقتصادية والاجتماعية.", "تأخر في مؤشر التنمية بسبب سوء استغلال الموارد.", "مختلف اللقاءات التواصلية والاستشارية."], correct: "مجموعة أفكار على شكل حجج نريد بها إقناع جهة معينة بتبني موقف أو سلوك معين." }
        ]
      }
    ];

    const app = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");
    const hudText = document.getElementById("hudText");

    const sounds = {
      correct: document.getElementById("audioCorrect"),
      wrong: document.getElementById("audioWrong"),
      complete: document.getElementById("audioComplete"),
      click: document.getElementById("audioClick")
    };

    const state = {
      screen: "home",
      unlockedLesson: Number(localStorage.getItem("socialStudiesUnlockedLesson") || 0),
      completedLessons: JSON.parse(localStorage.getItem("socialStudiesCompletedLessons") || "[]"),
      currentLesson: 0,
      currentCard: 0,
      currentQuestion: 0,
      scoreRaw: 0,
      quizQuestions: [],
      isFinalExam: false,
      selectedLeftButton: null,
      correctMatches: 0,
      answered: false,
      muted: false
    };

    function saveState() {
      localStorage.setItem("socialStudiesUnlockedLesson", String(state.unlockedLesson));
      localStorage.setItem("socialStudiesCompletedLessons", JSON.stringify(state.completedLessons));
    }

    function playSound(name) {
      if (state.muted) return;
      const sound = sounds[name];
      if (!sound) return;
      sound.currentTime = 0;
      sound.volume = name === "complete" ? 0.56 : name === "wrong" ? 0.28 : 0.35;
      sound.play().catch(() => {});
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function getDisplayScore() {
      return Math.round(state.scoreRaw);
    }

    function pointsPerQuestion() {
      return 20 / state.quizQuestions.length;
    }

    function addCorrectPoint() {
      state.scoreRaw = Math.min(20, state.scoreRaw + pointsPerQuestion());
    }

    function updateHud() {
      let progress = 0;
      let text = "ابدأ الرحلة";

      if (state.screen === "home") {
        progress = (state.completedLessons.length / lessons.length) * 82;
        text = `الدروس المكتملة: ${state.completedLessons.length}/${lessons.length}`;
      }

      if (state.screen === "lesson") {
        const lesson = lessons[state.currentLesson];
        progress = ((state.currentCard + 1) / lesson.cards.length) * 100;
        text = `درس ${state.currentLesson + 1} • بطاقة ${state.currentCard + 1}/${lesson.cards.length}`;
      }

      if (state.screen === "quiz") {
        progress = (state.currentQuestion / state.quizQuestions.length) * 100;
        text = `${state.isFinalExam ? "الامتحان النهائي" : "اختبار الدرس"} • ${getDisplayScore()}/20`;
      }

      if (state.screen === "result") {
        progress = getDisplayScore() >= 18 ? 100 : 45;
        text = `النتيجة: ${getDisplayScore()}/20`;
      }

      progressBar.style.width = `${Math.max(0, Math.min(100, Math.round(progress)))}%`;
      hudText.textContent = text;
    }

    function setView(html) {
      app.innerHTML = html;
      bindDynamicEvents();
      updateHud();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderHome() {
      state.screen = "home";
      state.isFinalExam = false;

      const finalUnlocked = state.completedLessons.length === lessons.length;

      setView(`
        <section class="screen active">
          <div class="panel hero">
            <div>
              <span class="pill">🎮 خاصك 18/20 باش تفتح الدرس التالي</span>
              <h2>راجع الاجتماعيات بطريقة ممتعة ومنظمة</h2>
              <p>
                اختار الدرس، اقرأ البطاقات واحدة بواحدة، ثم دوز اختبار صغير.
                من بعد ما تكمل جميع الدروس، غادي تفتح Final Boss.
              </p>

              <div class="rules-box" dir="rtl">
                ✅ النجاح في الدروس: 18/20 أو أكثر<br>
                👑 النجاح في الامتحان النهائي: أكثر من 18/20<br>
                🔗 المطابقة: اختار من العمود الأول ثم اختار الجواب المناسب من العمود الثاني
              </div>

              <div class="lesson-map">
                ${lessons.map((lesson, index) => {
                  const completed = state.completedLessons.includes(index);
                  const unlocked = index <= state.unlockedLesson;
                  return `
                    <button class="lesson-node ${unlocked ? "unlocked" : "locked"}" data-start-lesson="${index}" ${unlocked ? "" : "disabled"}>
                      <div class="node-icon">${completed ? "✅" : unlocked ? lesson.icon : "🔒"}</div>
                      <div class="node-title">${lesson.title}</div>
                      <div class="node-status">${completed ? "مكتمل" : unlocked ? "مفتوح" : "مقفل"}</div>
                    </button>
                  `;
                }).join("")}

                <button class="lesson-node ${finalUnlocked ? "unlocked" : "locked"}" data-final-intro ${finalUnlocked ? "" : "disabled"}>
                  <div class="node-icon">${finalUnlocked ? "👑" : "🔒"}</div>
                  <div class="node-title">Final Boss - الامتحان النهائي</div>
                  <div class="node-status">${finalUnlocked ? "مفتوح" : "أكمل جميع الدروس"}</div>
                </button>
              </div>
            </div>

            <div class="hero-art">🏆</div>
          </div>
        </section>
      `);
    }

    function renderCardItems(card) {
      if (card.terms) {
        return `
          <ul dir="rtl">
            ${card.terms.map(([term, definition]) => `<li><strong>${term}:</strong> ${definition}</li>`).join("")}
          </ul>
        `;
      }

      return `
        <ul dir="rtl">
          ${card.items.map(item => `<li>${item}</li>`).join("")}
        </ul>
      `;
    }

    function startLesson(index) {
      playSound("click");
      state.screen = "lesson";
      state.isFinalExam = false;
      state.currentLesson = index;
      state.currentCard = 0;
      state.currentQuestion = 0;
      state.scoreRaw = 0;
      renderLesson();
    }

    function renderLesson() {
      const lesson = lessons[state.currentLesson];
      const card = lesson.cards[state.currentCard];
      const isLast = state.currentCard === lesson.cards.length - 1;

      setView(`
        <section class="screen active">
          <div class="panel">
            <span class="pill">${lesson.icon} الدرس ${state.currentLesson + 1}</span>
            <h2 class="lesson-title">${lesson.title}</h2>

            <article class="learning-card" dir="rtl">
              <h3>${card.title}</h3>
              ${renderCardItems(card)}
            </article>

            <div class="button-row">
              <span class="mini-info">البطاقة ${state.currentCard + 1} من ${lesson.cards.length}</span>
              <button class="btn" data-next-card>${isLast ? "بدا الاختبار" : "التالي"}</button>
            </div>
          </div>
        </section>
      `);
    }

    function nextCard() {
      playSound("click");
      const lesson = lessons[state.currentLesson];

      if (state.currentCard < lesson.cards.length - 1) {
        state.currentCard += 1;
        renderLesson();
      } else {
        startQuiz(false);
      }
    }

    function startQuiz(isFinal) {
      state.screen = "quiz";
      state.isFinalExam = isFinal;
      state.currentQuestion = 0;
      state.scoreRaw = 0;
      state.answered = false;
      state.selectedLeftButton = null;
      state.correctMatches = 0;

      if (isFinal) {
        const allQuestions = lessons.flatMap(lesson => lesson.questions);
        state.quizQuestions = shuffle(allQuestions).slice(0, 20);
      } else {
        state.quizQuestions = shuffle(lessons[state.currentLesson].questions);
      }

      renderQuestion();
    }

    function renderQuestion() {
      const question = state.quizQuestions[state.currentQuestion];

      if (!question) {
        renderResult();
        return;
      }

      state.answered = false;
      state.selectedLeftButton = null;
      state.correctMatches = 0;

      let questionBody = "";

      if (question.type === "mcq") {
        questionBody = `
          <div class="answers">
            ${shuffle(question.answers).map(answer => `
              <button class="answer" data-mcq="${escapeHtml(answer)}">${answer}</button>
            `).join("")}
          </div>
        `;
      }

      if (question.type === "tf") {
        questionBody = `
          <div class="answers">
            <button class="answer" data-tf="true">صحيح ✅</button>
            <button class="answer" data-tf="false">خطأ ❌</button>
          </div>
        `;
      }

      if (question.type === "match") {
        const left = shuffle(question.pairs.map(pair => pair[0]));
        const right = shuffle(question.pairs.map(pair => pair[1]));

        questionBody = `
          <p class="mini-info" dir="rtl" style="text-align:right;">اختار عنصرا من العمود الأول، ثم اختار الجواب المناسب من العمود الثاني.</p>
          <div class="match-grid">
            <div class="match-col">
              <div class="match-col-title">العمود الأول</div>
              ${left.map(item => `<button class="match-item" data-left="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
            <div class="match-col">
              <div class="match-col-title">العمود الثاني</div>
              ${right.map(item => `<button class="match-item" data-right="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
          </div>
        `;
      }

      setView(`
        <section class="screen active">
          <div class="quiz-card">
            <div class="question-top">
              <span class="pill">${state.isFinalExam ? "👑 Final Boss" : "🧠 اختبار الدرس"}</span>
              <span class="hud-pill">سؤال ${state.currentQuestion + 1}/${state.quizQuestions.length} • ${getDisplayScore()}/20</span>
            </div>

            <h2 class="question-title" dir="rtl">${question.prompt}</h2>

            ${questionBody}

            <div class="feedback" id="feedback"></div>

            <div class="button-row">
              <button class="btn gray" data-home>الرئيسية</button>
              <button class="btn secondary" id="continueBtn" data-continue style="display:none;">تابع</button>
            </div>
          </div>
        </section>
      `);
    }

    function answerMCQ(value, clickedButton) {
      if (state.answered) return;

      const question = state.quizQuestions[state.currentQuestion];
      const isCorrect = value === question.correct;
      state.answered = true;

      document.querySelectorAll(".answer").forEach(button => {
        button.disabled = true;

        if (button.dataset.mcq === question.correct) {
          button.classList.add("correct");
        }

        if (button === clickedButton && !isCorrect) {
          button.classList.add("wrong");
        }
      });

      finishQuestion(
        isCorrect,
        isCorrect ? "ممتاز! الجواب صحيح." : `قريب! الجواب الصحيح هو: ${question.correct}`
      );
    }

    function answerTF(value, clickedButton) {
      if (state.answered) return;

      const question = state.quizQuestions[state.currentQuestion];
      const selected = value === "true";
      const isCorrect = selected === question.correct;
      state.answered = true;

      document.querySelectorAll(".answer").forEach(button => {
        button.disabled = true;
        const buttonValue = button.dataset.tf === "true";

        if (buttonValue === question.correct) {
          button.classList.add("correct");
        }

        if (button === clickedButton && !isCorrect) {
          button.classList.add("wrong");
        }
      });

      finishQuestion(
        isCorrect,
        isCorrect ? "رائع! إجابة صحيحة." : "انتبه! راجع البطاقة ثم حاول من جديد."
      );
    }

    function handleMatch(button) {
      const question = state.quizQuestions[state.currentQuestion];

      if (button.dataset.left) {
        document.querySelectorAll("[data-left]").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.selectedLeftButton = button;
        playSound("click");
        return;
      }

      if (button.dataset.right && state.selectedLeftButton) {
        const leftValue = state.selectedLeftButton.dataset.left;
        const rightValue = button.dataset.right;
        const valid = question.pairs.some(pair => pair[0] === leftValue && pair[1] === rightValue);

        if (valid) {
          state.selectedLeftButton.classList.remove("active");
          state.selectedLeftButton.classList.add("done");
          button.classList.add("done");

          state.selectedLeftButton.disabled = true;
          button.disabled = true;
          state.selectedLeftButton = null;
          state.correctMatches += 1;

          playSound("correct");

          if (state.correctMatches === question.pairs.length) {
            state.answered = true;
            finishQuestion(true, "ممتاز! كل المطابقات صحيحة.");
          }
        } else {
          const leftButton = state.selectedLeftButton;
          leftButton.classList.add("wrong");
          button.classList.add("wrong");
          playSound("wrong");

          setTimeout(() => {
            leftButton.classList.remove("wrong");
            button.classList.remove("wrong");
          }, 460);
        }
      }
    }

    function finishQuestion(isCorrect, message) {
      const feedback = document.getElementById("feedback");

      if (isCorrect) {
        addCorrectPoint();
        playSound("correct");
      } else {
        playSound("wrong");
      }

      feedback.className = `feedback show ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = message;

      const continueBtn = document.getElementById("continueBtn");
      continueBtn.style.display = "inline-block";

      updateHud();
    }

    function continueQuiz() {
      playSound("click");
      state.currentQuestion += 1;
      renderQuestion();
    }

    function renderResult() {
      state.screen = "result";
      const finalScore = getDisplayScore();
      const passedLesson = !state.isFinalExam && finalScore >= 18;
      const passedFinal = state.isFinalExam && finalScore > 18;
      const passed = passedLesson || passedFinal;

      if (passed) {
        playSound("complete");
        launchConfetti();
      } else {
        playSound("wrong");
      }

      if (passedLesson) {
        if (!state.completedLessons.includes(state.currentLesson)) {
          state.completedLessons.push(state.currentLesson);
        }

        state.unlockedLesson = Math.max(
          state.unlockedLesson,
          Math.min(lessons.length - 1, state.currentLesson + 1)
        );

        saveState();
      }

      setView(`
        <section class="screen active">
          <div class="panel result">
            <div class="result-emoji">${passed ? state.isFinalExam ? "👑" : "🎉" : "💪"}</div>
            <h2 class="result-title">
              ${
                passed
                  ? state.isFinalExam
                    ? "مبروك! ربحت اللعبة"
                    : "ممتاز! فتحت المرحلة الجاية"
                  : "حاول مرة أخرى"
              }
            </h2>

            <div class="big-score ${passed ? "" : "fail"}">${finalScore}/20</div>

            <p class="result-text" dir="rtl">
              ${
                passed
                  ? state.isFinalExam
                    ? "نجحتي في Final Boss وراجعتي أهم مفاهيم الاجتماعيات بنجاح."
                    : "النقطة ديالك 18/20 أو أكثر، لذلك المرحلة التالية ولات مفتوحة."
                  : state.isFinalExam
                    ? "في الامتحان النهائي خاصك تجيب أكثر من 18/20 باش تربح اللعبة."
                    : "خاصك تجيب 18/20 أو أكثر. غادي ترجع للدرس وتعاود الاختبار."
              }
            </p>

            <div class="button-row" style="justify-content:center;">
              ${
                passed
                  ? `<button class="btn" data-home>خريطة الدروس</button>`
                  : `<button class="btn red" data-retry>${state.isFinalExam ? "إعادة الامتحان النهائي" : "إعادة الدرس والاختبار"}</button>`
              }
            </div>
          </div>
        </section>
      `);
    }

    function renderFinalIntro() {
      playSound("click");

      setView(`
        <section class="screen active">
          <div class="panel hero">
            <div>
              <span class="pill">👑 Final Boss</span>
              <h2>الامتحان النهائي</h2>
              <p>
                الآن غادي تجاوب على أسئلة عشوائية من جميع الدروس الثمانية:
                التاريخ، الجغرافيا، والتربية على المواطنة.
              </p>

              <div class="rules-box" dir="rtl">
                شرط الفوز: خاصك تجيب أكثر من 18/20.
              </div>

              <div class="button-row">
                <button class="btn" data-start-final>ابدأ الامتحان النهائي</button>
                <button class="btn gray" data-home>الرئيسية</button>
              </div>
            </div>

            <div class="hero-art">👑</div>
          </div>
        </section>
      `);
    }

    function retryCurrent() {
      playSound("click");

      if (state.isFinalExam) {
        startQuiz(true);
      } else {
        startLesson(state.currentLesson);
      }
    }

    function launchConfetti() {
      const colors = ["#58cc02", "#1cb0f6", "#ffc800", "#ff4b4b", "#ce82ff", "#ff9600"];

      for (let i = 0; i < 80; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.85 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 2700);
      }
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-start-lesson]").forEach(button => {
        button.addEventListener("click", () => startLesson(Number(button.dataset.startLesson)));
      });

      document.querySelectorAll("[data-next-card]").forEach(button => {
        button.addEventListener("click", nextCard);
      });

      document.querySelectorAll("[data-mcq]").forEach(button => {
        button.addEventListener("click", () => answerMCQ(button.dataset.mcq, button));
      });

      document.querySelectorAll("[data-tf]").forEach(button => {
        button.addEventListener("click", () => answerTF(button.dataset.tf, button));
      });

      document.querySelectorAll(".match-item").forEach(button => {
        button.addEventListener("click", () => handleMatch(button));
      });

      document.querySelectorAll("[data-continue]").forEach(button => {
        button.addEventListener("click", continueQuiz);
      });

      document.querySelectorAll("[data-home]").forEach(button => {
        button.addEventListener("click", () => {
          playSound("click");
          renderHome();
        });
      });

      document.querySelectorAll("[data-retry]").forEach(button => {
        button.addEventListener("click", retryCurrent);
      });

      document.querySelectorAll("[data-final-intro]").forEach(button => {
        button.addEventListener("click", renderFinalIntro);
      });

      document.querySelectorAll("[data-start-final]").forEach(button => {
        button.addEventListener("click", () => {
          playSound("click");
          startQuiz(true);
        });
      });
    }

    document.getElementById("soundBtn").addEventListener("click", () => {
      state.muted = !state.muted;
      document.getElementById("soundBtn").textContent = state.muted ? "🔇" : "🔊";
      if (!state.muted) playSound("click");
    });

    document.getElementById("themeBtn").addEventListener("click", () => {
      playSound("click");
      document.body.classList.toggle("dark");
      document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });

    renderHome();
  </script>
</body>
</html>
