<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة الاجتماعيات - Duolingo Style</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green: #58cc02;
      --green-dark: #45a301;
      --green-soft: #e5ffd3;
      --blue: #1cb0f6;
      --blue-dark: #1387bd;
      --blue-soft: #dff5ff;
      --yellow: #ffc800;
      --yellow-soft: #fff5c2;
      --red: #ff4b4b;
      --red-dark: #d93030;
      --red-soft: #ffe3e3;
      --purple: #ce82ff;
      --purple-soft: #f3e3ff;
      --orange: #ff9600;

      --bg: #f5fbff;
      --card: #ffffff;
      --card-2: #f1f9ff;
      --text: #1f2d3d;
      --muted: #64748b;
      --border: #dbeafe;

      --shadow: 0 12px 0 rgba(30, 41, 59, 0.08), 0 20px 42px rgba(30, 41, 59, 0.12);
      --mini-shadow: 0 7px 0 rgba(30, 41, 59, 0.10);
      --radius: 24px;
    }

    body.dark {
      --bg: #0f172a;
      --card: #17233a;
      --card-2: #111c31;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: rgba(255, 255, 255, 0.12);

      --green-soft: rgba(88, 204, 2, 0.14);
      --blue-soft: rgba(28, 176, 246, 0.14);
      --yellow-soft: rgba(255, 200, 0, 0.14);
      --red-soft: rgba(255, 75, 75, 0.14);
      --purple-soft: rgba(206, 130, 255, 0.14);

      --shadow: 0 12px 0 rgba(0, 0, 0, 0.28), 0 20px 42px rgba(0, 0, 0, 0.34);
      --mini-shadow: 0 7px 0 rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Cairo", "Tajawal", system-ui, sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(28, 176, 246, 0.18), transparent 30%),
        radial-gradient(circle at 90% 15%, rgba(88, 204, 2, 0.18), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(206, 130, 255, 0.15), transparent 35%),
        var(--bg);
      overflow-x: hidden;
      transition: background 0.35s ease, color 0.35s ease;
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      font-weight: 900;
    }

    button:disabled {
      cursor: not-allowed;
    }

    .app {
      width: min(1120px, 94vw);
      margin: 0 auto;
      padding: 22px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      animation: slideDown 0.55s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mascot {
      width: 66px;
      height: 66px;
      border-radius: 22px;
      background: linear-gradient(145deg, var(--green), #9be600);
      box-shadow: var(--mini-shadow);
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      transform: rotate(-4deg);
      animation: mascotFloat 3s ease-in-out infinite;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.55rem);
      line-height: 1.15;
      font-weight: 900;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
      box-shadow: var(--mini-shadow);
      font-size: 1.25rem;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.03);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      animation: fadeUp 0.65s ease both;
    }

    .progress-shell {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 8px;
      box-shadow: var(--mini-shadow);
    }

    .progress-bar {
      height: 19px;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
      transition: width 0.45s cubic-bezier(.18,.9,.3,1);
    }

    .hud-pill {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      box-shadow: var(--mini-shadow);
      padding: 12px 18px;
      font-size: 1.02rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .screen {
      display: none;
      min-height: 610px;
    }

    .screen.active {
      display: block;
      animation: fadeSlide 0.5s cubic-bezier(.18,.9,.3,1) both;
    }

    .panel {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 42px);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(88, 204, 2, 0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(28, 176, 246, 0.11), transparent 30%);
      pointer-events: none;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      align-items: center;
      gap: 28px;
    }

    .hero h2,
    .lesson-title,
    .result-title {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.7px;
    }

    .hero p,
    .concept-text,
    .result-text {
      margin: 0;
      font-size: clamp(1.25rem, 2.4vw, 1.7rem);
      line-height: 2;
      font-weight: 800;
    }

    .hero-art {
      min-height: 330px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.55), transparent 36%),
        linear-gradient(145deg, #baff73, #75d8ff);
      display: grid;
      place-items: center;
      font-size: clamp(5rem, 12vw, 9rem);
      box-shadow: var(--shadow);
      animation: float 3.2s ease-in-out infinite;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--blue-soft);
      color: var(--blue-dark);
      border: 2px solid rgba(28, 176, 246, 0.28);
      border-radius: 999px;
      padding: 8px 15px;
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    body.dark .pill {
      color: #7dd3fc;
    }

    .lesson-map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .lesson-node {
      min-height: 158px;
      border-radius: 22px;
      padding: 18px;
      border: 2px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      box-shadow: var(--mini-shadow);
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    .lesson-node.unlocked {
      background: linear-gradient(145deg, var(--green-soft), var(--blue-soft));
    }

    .lesson-node.locked {
      opacity: 0.55;
      filter: grayscale(0.4);
    }

    .lesson-node.unlocked:hover {
      transform: translateY(-5px);
      filter: brightness(1.02);
    }

    .node-icon {
      font-size: 2.2rem;
    }

    .node-title {
      font-size: 1.04rem;
      line-height: 1.45;
      font-weight: 900;
    }

    .node-status {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 900;
    }

    .concept-card {
      margin-top: 22px;
      min-height: 280px;
      border-radius: 24px;
      background: var(--card-2);
      border: 2px solid var(--border);
      padding: clamp(22px, 4vw, 38px);
      display: flex;
      align-items: center;
      box-shadow: inset 0 -5px 0 rgba(30, 41, 59, 0.05);
      animation: fadeSlide 0.45s ease both;
    }

    .concept-text {
      width: 100%;
    }

    .button-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .btn {
      min-width: 170px;
      border-radius: 18px;
      padding: 16px 24px;
      color: #ffffff;
      background: var(--green);
      box-shadow: 0 7px 0 var(--green-dark);
      font-size: 1.12rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .btn.secondary {
      background: var(--blue);
      box-shadow: 0 7px 0 var(--blue-dark);
    }

    .btn.red {
      background: var(--red);
      box-shadow: 0 7px 0 var(--red-dark);
    }

    .btn.gray {
      background: #94a3b8;
      box-shadow: 0 7px 0 #64748b;
    }

    .mini-info {
      color: var(--muted);
      font-size: 1.03rem;
      font-weight: 900;
    }

    .quiz-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 38px);
      animation: fadeSlide 0.45s ease both;
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }

    .question-title {
      margin: 0 0 22px;
      font-size: clamp(1.55rem, 3.2vw, 2.55rem);
      line-height: 1.35;
      font-weight: 900;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .answer,
    .match-item {
      background: var(--card-2);
      border: 3px solid var(--border);
      color: var(--text);
      border-radius: 18px;
      box-shadow: 0 6px 0 rgba(30, 41, 59, 0.08);
      padding: 18px;
      min-height: 74px;
      font-size: 1.12rem;
      text-align: right;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .answer:hover,
    .match-item:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    .answer.correct,
    .match-item.done {
      border-color: var(--green);
      background: var(--green-soft);
      animation: successBounce 0.45s ease;
    }

    .answer.wrong,
    .match-item.wrong {
      border-color: var(--red);
      background: var(--red-soft);
      animation: errorShake 0.42s ease;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 16px;
    }

    .match-col {
      display: grid;
      gap: 12px;
    }

    .match-item {
      text-align: center;
    }

    .match-item.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      transform: translateY(-2px) scale(1.01);
    }

    .match-item.done {
      opacity: 0.75;
      pointer-events: none;
    }

    .feedback {
      display: none;
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1.12rem;
      font-weight: 900;
      line-height: 1.7;
    }

    .feedback.show {
      display: block;
      animation: fadeUp 0.25s ease both;
    }

    .feedback.good {
      color: var(--green-dark);
      background: var(--green-soft);
      border: 2px solid rgba(88, 204, 2, 0.35);
    }

    .feedback.bad {
      color: var(--red-dark);
      background: var(--red-soft);
      border: 2px solid rgba(255, 75, 75, 0.35);
    }

    body.dark .feedback.good {
      color: #a3e635;
    }

    body.dark .feedback.bad {
      color: #fca5a5;
    }

    .result {
      text-align: center;
    }

    .result-emoji {
      font-size: clamp(5rem, 13vw, 9rem);
      margin-bottom: 12px;
      animation: successBounce 1.1s ease infinite;
    }

    .big-score {
      width: max-content;
      min-width: 180px;
      margin: 22px auto;
      border-radius: 30px;
      padding: 14px 26px;
      color: white;
      background: linear-gradient(145deg, var(--green), #a4e900);
      box-shadow: 0 10px 0 var(--green-dark);
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 900;
    }

    .big-score.fail {
      background: linear-gradient(145deg, var(--red), #ff8686);
      box-shadow: 0 10px 0 var(--red-dark);
    }

    .rules-box {
      margin-top: 20px;
      background: var(--yellow-soft);
      border: 2px solid rgba(255, 200, 0, 0.42);
      border-radius: 22px;
      padding: 18px;
      color: var(--text);
      line-height: 1.8;
      font-weight: 900;
    }

    .confetti {
      position: fixed;
      z-index: 100;
      top: -25px;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      pointer-events: none;
      animation: confettiFall 1.9s linear forwards;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes mascotFloat {
      0%, 100% {
        transform: translateY(0) rotate(-4deg);
      }
      50% {
        transform: translateY(-6px) rotate(3deg);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(2deg);
      }
      50% {
        transform: translateY(-12px) rotate(-2deg);
      }
    }

    @keyframes successBounce {
      0%, 100% {
        transform: scale(1);
      }
      38% {
        transform: scale(1.09);
      }
      62% {
        transform: scale(0.97);
      }
    }

    @keyframes errorShake {
      0%, 100% {
        transform: translateX(0);
      }
      20% {
        transform: translateX(-8px);
      }
      40% {
        transform: translateX(8px);
      }
      60% {
        transform: translateX(-6px);
      }
      80% {
        transform: translateX(6px);
      }
    }

    @keyframes confettiFall {
      to {
        opacity: 0;
        transform: translateY(108vh) rotate(720deg);
      }
    }

    @media (max-width: 860px) {
      body {
        font-size: 1.08rem;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand {
        align-items: flex-start;
      }

      .mascot {
        width: 56px;
        height: 56px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 220px;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .lesson-map {
        grid-template-columns: 1fr;
      }

      .answers,
      .match-grid {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .button-row {
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mascot">🦉</div>
        <div>
          <h1>رحلة التفوق في الاجتماعيات</h1>
          <p>تعلّم، جاوب، وفتح المراحل بحال Duolingo</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="soundBtn" title="تشغيل/إيقاف الصوت">🔊</button>
        <button class="icon-btn" id="themeBtn" title="الوضع الليلي/النهاري">🌙</button>
      </div>
    </header>

    <section class="hud">
      <div class="progress-shell">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="hud-pill" id="hudText">ابدأ الرحلة</div>
    </section>

    <main id="app"></main>
  </div>

  <audio id="audioCorrect" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
  <audio id="audioWrong" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/946/946-preview.mp3"></audio>
  <audio id="audioComplete" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
  <audio id="audioClick" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

  <script>
    const lessons = [
      {
        id: 1,
        icon: "📜",
        title: "التاريخ - الكفاح من أجل الاستقلال",
        paragraphs: [
          "المقاومة المسلحة: أحمد الهيبة (سيدي بوعثمان 1912)، موحى أحمو الزياني (الهري 1914)، الخطابي (أنوال 1921)، عسو أوبسلام (بوكافر 1933).",
          "الحركة الوطنية: بدأت بالمطالبة بالإصلاحات (1930) ثم المطالبة بالاستقلال في 11 يناير 1944.",
          "استكمال الوحدة الترابية: طنجة (1956)، طرفاية (1958)، سيدي إفني (1969)، الساقية الحمراء (1975)، واد الذهب (1979).",
          "مصطلحات: الظهير البربري (قانون 1930 للتفريق بين الأمازيغ والعرب)، الحركة الوطنية، الاستقلال."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "ما تاريخ المطالبة بالاستقلال؟",
            answers: ["11 يناير 1944", "16 ماي 1930", "1956", "1979"],
            correct: "11 يناير 1944"
          },
          {
            type: "match",
            prompt: "اربط القائد بالمعركة المناسبة:",
            pairs: [
              ["أحمد الهيبة", "سيدي بوعثمان 1912"],
              ["موحى أحمو الزياني", "الهري 1914"],
              ["الخطابي", "أنوال 1921"],
              ["عسو أوبسلام", "بوكافر 1933"]
            ]
          },
          {
            type: "tf",
            prompt: "الحركة الوطنية بدأت بالمطالبة بالإصلاحات سنة 1930.",
            correct: true
          },
          {
            type: "mcq",
            prompt: "ما المقصود بالظهير البربري؟",
            answers: [
              "قانون 1930 للتفريق بين الأمازيغ والعرب",
              "معركة في الريف سنة 1921",
              "وثيقة المطالبة بالاستقلال",
              "منطقة استرجعها المغرب سنة 1975"
            ],
            correct: "قانون 1930 للتفريق بين الأمازيغ والعرب"
          },
          {
            type: "mcq",
            prompt: "متى استرجع المغرب واد الذهب؟",
            answers: ["1979", "1975", "1969", "1958"],
            correct: "1979"
          }
        ]
      },
      {
        id: 2,
        icon: "🌍",
        title: "الجغرافيا - نيجيريا والنهج الجغرافي",
        paragraphs: [
          "نيجيريا - الغنى والضعف: غنى طبيعي (بترول، غاز، فلاحة) وضعف تنموي (الرتبة 153، فقر).",
          "العوامل المفسرة: انفجار ديمغرافي، هيمنة الشركات الأجنبية، الفساد، بوكو حرام.",
          "النهج الجغرافي: يعتمد على 3 خطوات بالترتيب: الوصف (تقديم الظاهرة)، التفسير (إبراز العوامل)، التعميم (المقارنة واستخلاص القواعد)."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "ما مظاهر الغنى الطبيعي في نيجيريا حسب الدرس؟",
            answers: ["بترول، غاز، فلاحة", "ذهب فقط", "صناعة السيارات فقط", "سياحة جبلية"],
            correct: "بترول، غاز، فلاحة"
          },
          {
            type: "tf",
            prompt: "تعاني نيجيريا من ضعف تنموي رغم توفرها على غنى طبيعي.",
            correct: true
          },
          {
            type: "tf",
            prompt: "حسب الدرس، رتبة نيجيريا في مؤشر التنمية هي 153.",
            correct: true
          },
          {
            type: "match",
            prompt: "اربط خطوات النهج الجغرافي بمعانيها:",
            pairs: [
              ["الوصف", "تقديم الظاهرة"],
              ["التفسير", "إبراز العوامل"],
              ["التعميم", "المقارنة واستخلاص القواعد"]
            ]
          },
          {
            type: "mcq",
            prompt: "أي عامل من العوامل المفسرة للضعف التنموي في نيجيريا؟",
            answers: ["الفساد", "غياب الفلاحة", "انعدام السكان", "غياب البترول والغاز"],
            correct: "الفساد"
          }
        ]
      },
      {
        id: 3,
        icon: "🕊️",
        title: "المواطنة - حوار الأديان والبرامج الإعلامية",
        paragraphs: [
          "حوار الأديان: لقاءات تواصلية لنشر السلم. من أساليبه: حوارات فردية، جماعية، بالمراسلة. المغرب نموذج للتعايش.",
          "البرنامج الإعلامي: وسيلة للتأثير في الأفراد. أشكاله: مكتوب، مرئي، مسموع. خطوته: التصور (اختيار الموضوع) والتخطيط (صياغة النص)."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "ما تعريف البرنامج الإعلامي؟",
            answers: [
              "وسيلة للتأثير في الأفراد",
              "معركة ضد الاستعمار",
              "قانون للتفريق بين الأمازيغ والعرب",
              "مرحلة من استكمال الوحدة الترابية"
            ],
            correct: "وسيلة للتأثير في الأفراد"
          },
          {
            type: "match",
            prompt: "اربط نوع الإعلام بمثاله:",
            pairs: [
              ["مكتوب", "مقال"],
              ["مرئي", "فيديو"],
              ["مسموع", "إذاعة"]
            ]
          },
          {
            type: "tf",
            prompt: "من أساليب حوار الأديان: حوارات فردية، جماعية، وبالمراسلة.",
            correct: true
          },
          {
            type: "mcq",
            prompt: "ما المقصود بمرحلة التصور في البرنامج الإعلامي؟",
            answers: ["اختيار الموضوع", "صياغة النص", "أنوال 1921", "إبراز العوامل"],
            correct: "اختيار الموضوع"
          },
          {
            type: "tf",
            prompt: "المغرب نموذج للتعايش حسب الدرس.",
            correct: true
          }
        ]
      }
    ];

    const extraFinalQuestions = [
      {
        type: "mcq",
        prompt: "متى استرجع المغرب طنجة؟",
        answers: ["1956", "1958", "1969", "1975"],
        correct: "1956"
      },
      {
        type: "mcq",
        prompt: "ما الخطوة الأولى في النهج الجغرافي؟",
        answers: ["الوصف", "التفسير", "التعميم", "التخطيط"],
        correct: "الوصف"
      },
      {
        type: "tf",
        prompt: "البرنامج الإعلامي قد يكون مكتوبا أو مرئيا أو مسموعا.",
        correct: true
      },
      {
        type: "mcq",
        prompt: "ما معنى التعميم في النهج الجغرافي؟",
        answers: [
          "المقارنة واستخلاص القواعد",
          "تقديم الظاهرة",
          "إبراز العوامل",
          "اختيار الموضوع"
        ],
        correct: "المقارنة واستخلاص القواعد"
      }
    ];

    const app = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");
    const hudText = document.getElementById("hudText");

    const sounds = {
      correct: document.getElementById("audioCorrect"),
      wrong: document.getElementById("audioWrong"),
      complete: document.getElementById("audioComplete"),
      click: document.getElementById("audioClick")
    };

    const state = {
      screen: "home",
      unlockedLesson: Number(localStorage.getItem("unlockedLesson") || 0),
      completedLessons: JSON.parse(localStorage.getItem("completedLessons") || "[]"),
      currentLesson: 0,
      currentParagraph: 0,
      currentQuestion: 0,
      scoreRaw: 0,
      quizQuestions: [],
      isFinalExam: false,
      selectedLeftButton: null,
      correctMatches: 0,
      answered: false,
      muted: false
    };

    function saveState() {
      localStorage.setItem("unlockedLesson", String(state.unlockedLesson));
      localStorage.setItem("completedLessons", JSON.stringify(state.completedLessons));
    }

    function playSound(name) {
      if (state.muted) return;
      const sound = sounds[name];
      if (!sound) return;

      sound.currentTime = 0;
      sound.volume = name === "complete" ? 0.56 : name === "wrong" ? 0.28 : 0.35;
      sound.play().catch(() => {});
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function getDisplayScore() {
      return Math.round(state.scoreRaw);
    }

    function pointsPerQuestion() {
      return 20 / state.quizQuestions.length;
    }

    function addCorrectPoint() {
      state.scoreRaw = Math.min(20, state.scoreRaw + pointsPerQuestion());
    }

    function updateHud() {
      let progress = 0;
      let text = "ابدأ الرحلة";

      if (state.screen === "home") {
        progress = (state.completedLessons.length / lessons.length) * 80;
        text = `الدروس المكتملة: ${state.completedLessons.length}/${lessons.length}`;
      }

      if (state.screen === "lesson") {
        const lesson = lessons[state.currentLesson];
        progress = ((state.currentParagraph + 1) / lesson.paragraphs.length) * 100;
        text = `درس ${state.currentLesson + 1} • بطاقة ${state.currentParagraph + 1}/${lesson.paragraphs.length}`;
      }

      if (state.screen === "quiz") {
        progress = (state.currentQuestion / state.quizQuestions.length) * 100;
        text = `${state.isFinalExam ? "الامتحان النهائي" : "اختبار الدرس"} • ${getDisplayScore()}/20`;
      }

      if (state.screen === "result") {
        progress = getDisplayScore() >= 18 ? 100 : 45;
        text = `النتيجة: ${getDisplayScore()}/20`;
      }

      progressBar.style.width = `${Math.max(0, Math.min(100, Math.round(progress)))}%`;
      hudText.textContent = text;
    }

    function setView(html) {
      app.innerHTML = html;
      bindDynamicEvents();
      updateHud();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderHome() {
      state.screen = "home";
      state.isFinalExam = false;

      const finalUnlocked = state.completedLessons.length === lessons.length;

      setView(`
        <section class="screen active">
          <div class="panel hero">
            <div>
              <span class="pill">🎮 خاصك 18/20 باش تفتح الدرس التالي</span>
              <h2>تعلم الاجتماعيات بطريقة ممتعة وسريعة</h2>
              <p>
                اقرأ المفاهيم في بطاقات قصيرة، ثم جاوب على اختبار صغير.
                عند النجاح، تفتح المرحلة التالية. بعد إكمال الدروس كلها، غادي تواجه Final Boss.
              </p>

              <div class="rules-box">
                ✅ النجاح في الدروس: 18/20 أو أكثر<br>
                👑 النجاح في الامتحان النهائي: أكثر من 18/20<br>
                🔗 المطابقة: اختار من العمود الأول ثم اختار الجواب المناسب من العمود الثاني
              </div>

              <div class="lesson-map">
                ${lessons.map((lesson, index) => {
                  const completed = state.completedLessons.includes(index);
                  const unlocked = index <= state.unlockedLesson;
                  return `
                    <button class="lesson-node ${unlocked ? "unlocked" : "locked"}" data-start-lesson="${index}" ${unlocked ? "" : "disabled"}>
                      <div class="node-icon">${completed ? "✅" : unlocked ? lesson.icon : "🔒"}</div>
                      <div class="node-title">${lesson.title}</div>
                      <div class="node-status">${completed ? "مكتمل" : unlocked ? "مفتوح" : "مقفل"}</div>
                    </button>
                  `;
                }).join("")}

                <button class="lesson-node ${finalUnlocked ? "unlocked" : "locked"}" data-final-intro ${finalUnlocked ? "" : "disabled"}>
                  <div class="node-icon">${finalUnlocked ? "👑" : "🔒"}</div>
                  <div class="node-title">Final Boss - الامتحان النهائي</div>
                  <div class="node-status">${finalUnlocked ? "مفتوح" : "أكمل جميع الدروس"}</div>
                </button>
              </div>
            </div>

            <div class="hero-art">🏆</div>
          </div>
        </section>
      `);
    }

    function startLesson(index) {
      playSound("click");
      state.screen = "lesson";
      state.isFinalExam = false;
      state.currentLesson = index;
      state.currentParagraph = 0;
      state.currentQuestion = 0;
      state.scoreRaw = 0;
      renderLesson();
    }

    function renderLesson() {
      const lesson = lessons[state.currentLesson];
      const paragraph = lesson.paragraphs[state.currentParagraph];
      const isLast = state.currentParagraph === lesson.paragraphs.length - 1;

      setView(`
        <section class="screen active">
          <div class="panel">
            <span class="pill">${lesson.icon} الدرس ${state.currentLesson + 1}</span>
            <h2 class="lesson-title">${lesson.title}</h2>

            <div class="concept-card">
              <p class="concept-text">${paragraph}</p>
            </div>

            <div class="button-row">
              <span class="mini-info">البطاقة ${state.currentParagraph + 1} من ${lesson.paragraphs.length}</span>
              <button class="btn" data-next-concept>${isLast ? "بدا الاختبار" : "التالي"}</button>
            </div>
          </div>
        </section>
      `);
    }

    function nextConcept() {
      playSound("click");
      const lesson = lessons[state.currentLesson];

      if (state.currentParagraph < lesson.paragraphs.length - 1) {
        state.currentParagraph += 1;
        renderLesson();
      } else {
        startQuiz(false);
      }
    }

    function startQuiz(isFinal) {
      state.screen = "quiz";
      state.isFinalExam = isFinal;
      state.currentQuestion = 0;
      state.scoreRaw = 0;
      state.answered = false;
      state.selectedLeftButton = null;
      state.correctMatches = 0;

      if (isFinal) {
        const allQuestions = lessons.flatMap(lesson => lesson.questions).concat(extraFinalQuestions);
        state.quizQuestions = shuffle(allQuestions).slice(0, 10);
      } else {
        state.quizQuestions = shuffle(lessons[state.currentLesson].questions);
      }

      renderQuestion();
    }

    function renderQuestion() {
      const question = state.quizQuestions[state.currentQuestion];

      if (!question) {
        renderResult();
        return;
      }

      state.answered = false;
      state.selectedLeftButton = null;
      state.correctMatches = 0;

      let questionBody = "";

      if (question.type === "mcq") {
        questionBody = `
          <div class="answers">
            ${shuffle(question.answers).map(answer => `
              <button class="answer" data-mcq="${escapeHtml(answer)}">${answer}</button>
            `).join("")}
          </div>
        `;
      }

      if (question.type === "tf") {
        questionBody = `
          <div class="answers">
            <button class="answer" data-tf="true">صحيح ✅</button>
            <button class="answer" data-tf="false">خطأ ❌</button>
          </div>
        `;
      }

      if (question.type === "match") {
        const left = shuffle(question.pairs.map(pair => pair[0]));
        const right = shuffle(question.pairs.map(pair => pair[1]));

        questionBody = `
          <p class="mini-info">اختار عنصرا من العمود الأول، ثم اختار الجواب المناسب من العمود الثاني.</p>
          <div class="match-grid">
            <div class="match-col">
              ${left.map(item => `<button class="match-item" data-left="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
            <div class="match-col">
              ${right.map(item => `<button class="match-item" data-right="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
          </div>
        `;
      }

      setView(`
        <section class="screen active">
          <div class="quiz-card">
            <div class="question-top">
              <span class="pill">${state.isFinalExam ? "👑 Final Boss" : "🧠 اختبار الدرس"}</span>
              <span class="hud-pill">سؤال ${state.currentQuestion + 1}/${state.quizQuestions.length} • ${getDisplayScore()}/20</span>
            </div>

            <h2 class="question-title">${question.prompt}</h2>

            ${questionBody}

            <div class="feedback" id="feedback"></div>

            <div class="button-row">
              <button class="btn gray" data-home>الرئيسية</button>
              <button class="btn secondary" id="continueBtn" data-continue style="display:none;">تابع</button>
            </div>
          </div>
        </section>
      `);
    }

    function answerMCQ(value, clickedButton) {
      if (state.answered) return;

      const question = state.quizQuestions[state.currentQuestion];
      const isCorrect = value === question.correct;
      state.answered = true;

      document.querySelectorAll(".answer").forEach(button => {
        button.disabled = true;

        if (button.dataset.mcq === question.correct) {
          button.classList.add("correct");
        }

        if (button === clickedButton && !isCorrect) {
          button.classList.add("wrong");
        }
      });

      finishQuestion(
        isCorrect,
        isCorrect ? "ممتاز! الجواب صحيح." : `قريب! الجواب الصحيح هو: ${question.correct}`
      );
    }

    function answerTF(value, clickedButton) {
      if (state.answered) return;

      const question = state.quizQuestions[state.currentQuestion];
      const selected = value === "true";
      const isCorrect = selected === question.correct;
      state.answered = true;

      document.querySelectorAll(".answer").forEach(button => {
        button.disabled = true;
        const buttonValue = button.dataset.tf === "true";

        if (buttonValue === question.correct) {
          button.classList.add("correct");
        }

        if (button === clickedButton && !isCorrect) {
          button.classList.add("wrong");
        }
      });

      finishQuestion(
        isCorrect,
        isCorrect ? "رائع! إجابة صحيحة." : "انتبه! راجع المفهوم ثم حاول من جديد."
      );
    }

    function handleMatch(button) {
      const question = state.quizQuestions[state.currentQuestion];

      if (button.dataset.left) {
        document.querySelectorAll("[data-left]").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.selectedLeftButton = button;
        playSound("click");
        return;
      }

      if (button.dataset.right && state.selectedLeftButton) {
        const leftValue = state.selectedLeftButton.dataset.left;
        const rightValue = button.dataset.right;
        const valid = question.pairs.some(pair => pair[0] === leftValue && pair[1] === rightValue);

        if (valid) {
          state.selectedLeftButton.classList.remove("active");
          state.selectedLeftButton.classList.add("done");
          button.classList.add("done");

          state.selectedLeftButton.disabled = true;
          button.disabled = true;
          state.selectedLeftButton = null;
          state.correctMatches += 1;

          playSound("correct");

          if (state.correctMatches === question.pairs.length) {
            state.answered = true;
            finishQuestion(true, "ممتاز! كل المطابقات صحيحة.");
          }
        } else {
          const leftButton = state.selectedLeftButton;
          leftButton.classList.add("wrong");
          button.classList.add("wrong");
          playSound("wrong");

          setTimeout(() => {
            leftButton.classList.remove("wrong");
            button.classList.remove("wrong");
          }, 460);
        }
      }
    }

    function finishQuestion(isCorrect, message) {
      const feedback = document.getElementById("feedback");

      if (isCorrect) {
        addCorrectPoint();
        playSound("correct");
      } else {
        playSound("wrong");
      }

      feedback.className = `feedback show ${isCorrect ? "good" : "bad"}`;
      feedback.textContent = message;

      const continueBtn = document.getElementById("continueBtn");
      continueBtn.style.display = "inline-block";

      updateHud();
    }

    function continueQuiz() {
      playSound("click");
      state.currentQuestion += 1;
      renderQuestion();
    }

    function renderResult() {
      state.screen = "result";
      const finalScore = getDisplayScore();
      const passedLesson = !state.isFinalExam && finalScore >= 18;
      const passedFinal = state.isFinalExam && finalScore > 18;
      const passed = passedLesson || passedFinal;

      if (passed) {
        playSound("complete");
        launchConfetti();
      } else {
        playSound("wrong");
      }

      if (passedLesson) {
        if (!state.completedLessons.includes(state.currentLesson)) {
          state.completedLessons.push(state.currentLesson);
        }
        state.unlockedLesson = Math.max(
          state.unlockedLesson,
          Math.min(lessons.length - 1, state.currentLesson + 1)
        );
        saveState();
      }

      setView(`
        <section class="screen active">
          <div class="panel result">
            <div class="result-emoji">${passed ? state.isFinalExam ? "👑" : "🎉" : "💪"}</div>
            <h2 class="result-title">
              ${
                passed
                  ? state.isFinalExam
                    ? "مبروك! ربحت اللعبة"
                    : "ممتاز! فتحت المرحلة الجاية"
                  : "حاول مرة أخرى"
              }
            </h2>

            <div class="big-score ${passed ? "" : "fail"}">${finalScore}/20</div>

            <p class="result-text">
              ${
                passed
                  ? state.isFinalExam
                    ? "نجحتي في Final Boss وراجعتي أهم مفاهيم الاجتماعيات بنجاح."
                    : "النقطة ديالك 18/20 أو أكثر، لذلك المرحلة التالية ولات مفتوحة."
                  : state.isFinalExam
                    ? "في الامتحان النهائي خاصك تجيب أكثر من 18/20 باش تربح اللعبة."
                    : "خاصك تجيب 18/20 أو أكثر. غادي ترجع للدرس وتعاود الاختبار."
              }
            </p>

            <div class="button-row" style="justify-content:center;">
              ${
                passed
                  ? `<button class="btn" data-home>خريطة الدروس</button>`
                  : `<button class="btn red" data-retry>${state.isFinalExam ? "إعادة الامتحان النهائي" : "إعادة الدرس والاختبار"}</button>`
              }
            </div>
          </div>
        </section>
      `);
    }

    function renderFinalIntro() {
      playSound("click");

      setView(`
        <section class="screen active">
          <div class="panel hero">
            <div>
              <span class="pill">👑 Final Boss</span>
              <h2>الامتحان النهائي</h2>
              <p>
                الآن غادي تجاوب على أسئلة عشوائية من جميع الدروس:
                التاريخ، الجغرافيا، والتربية على المواطنة.
              </p>

              <div class="rules-box">
                شرط الفوز: خاصك تجيب أكثر من 18/20.
              </div>

              <div class="button-row">
                <button class="btn" data-start-final>ابدأ الامتحان النهائي</button>
                <button class="btn gray" data-home>الرئيسية</button>
              </div>
            </div>

            <div class="hero-art">👑</div>
          </div>
        </section>
      `);
    }

    function retryCurrent() {
      playSound("click");

      if (state.isFinalExam) {
        startQuiz(true);
      } else {
        startLesson(state.currentLesson);
      }
    }

    function launchConfetti() {
      const colors = ["#58cc02", "#1cb0f6", "#ffc800", "#ff4b4b", "#ce82ff", "#ff9600"];

      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.85 + "s";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        setTimeout(() => piece.remove(), 2600);
      }
    }

    function bindDynamicEvents() {
      document.querySelectorAll("[data-start-lesson]").forEach(button => {
        button.addEventListener("click", () => startLesson(Number(button.dataset.startLesson)));
      });

      document.querySelectorAll("[data-next-concept]").forEach(button => {
        button.addEventListener("click", nextConcept);
      });

      document.querySelectorAll("[data-mcq]").forEach(button => {
        button.addEventListener("click", () => answerMCQ(button.dataset.mcq, button));
      });

      document.querySelectorAll("[data-tf]").forEach(button => {
        button.addEventListener("click", () => answerTF(button.dataset.tf, button));
      });

      document.querySelectorAll(".match-item").forEach(button => {
        button.addEventListener("click", () => handleMatch(button));
      });

      document.querySelectorAll("[data-continue]").forEach(button => {
        button.addEventListener("click", continueQuiz);
      });

      document.querySelectorAll("[data-home]").forEach(button => {
        button.addEventListener("click", () => {
          playSound("click");
          renderHome();
        });
      });

      document.querySelectorAll("[data-retry]").forEach(button => {
        button.addEventListener("click", retryCurrent);
      });

      document.querySelectorAll("[data-final-intro]").forEach(button => {
        button.addEventListener("click", renderFinalIntro);
      });

      document.querySelectorAll("[data-start-final]").forEach(button => {
        button.addEventListener("click", () => {
          playSound("click");
          startQuiz(true);
        });
      });
    }

    document.getElementById("soundBtn").addEventListener("click", () => {
      state.muted = !state.muted;
      document.getElementById("soundBtn").textContent = state.muted ? "🔇" : "🔊";
      if (!state.muted) playSound("click");
    });

    document.getElementById("themeBtn").addEventListener("click", () => {
      playSound("click");
      document.body.classList.toggle("dark");
      document.getElementById("themeBtn").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });

    renderHome();
  </script>
</body>
</html>
