<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رحلة التفوق - مراجعة الاجتماعيات</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #58cc02;
      --green-dark: #46a302;
      --blue: #1cb0f6;
      --blue-dark: #1688c4;
      --purple: #ce82ff;
      --yellow: #ffc800;
      --orange: #ff9600;
      --red: #ff4b4b;
      --red-dark: #d93636;
      --ink: #233044;
      --muted: #6b7280;
      --bg: #f2fbff;
      --card: #ffffff;
      --line: #d8e6ef;
      --soft: #eef8ff;
      --shadow: 0 12px 0 rgba(15, 23, 42, 0.08), 0 18px 40px rgba(15, 23, 42, 0.12);
      --small-shadow: 0 7px 0 rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Cairo", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(28, 176, 246, 0.18), transparent 32%),
        radial-gradient(circle at bottom left, rgba(88, 204, 2, 0.16), transparent 32%),
        linear-gradient(135deg, #f8fdff, var(--bg));
      overflow-x: hidden;
    }

    body.dark {
      --ink: #f8fafc;
      --muted: #cbd5e1;
      --bg: #0f172a;
      --card: #172033;
      --line: rgba(255,255,255,0.13);
      --soft: #111c30;
      --shadow: 0 12px 0 rgba(0, 0, 0, 0.28), 0 18px 40px rgba(0, 0, 0, 0.32);
      --small-shadow: 0 7px 0 rgba(0, 0, 0, 0.28);
      background:
        radial-gradient(circle at top right, rgba(28, 176, 246, 0.22), transparent 32%),
        radial-gradient(circle at bottom left, rgba(88, 204, 2, 0.18), transparent 32%),
        linear-gradient(135deg, #101827, #0f172a);
    }

    button {
      font-family: inherit;
      border: 0;
      cursor: pointer;
      font-weight: 900;
    }

    .app {
      width: min(1120px, 94vw);
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      animation: slideDown 0.55s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mascot {
      width: 64px;
      height: 64px;
      border-radius: 21px;
      background: linear-gradient(145deg, var(--green), #8ee000);
      display: grid;
      place-items: center;
      box-shadow: var(--small-shadow);
      font-size: 2rem;
      transform: rotate(-4deg);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 2.5rem);
      line-height: 1.1;
      font-weight: 900;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .round-btn {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: var(--card);
      color: var(--ink);
      box-shadow: var(--small-shadow);
      border: 2px solid var(--line);
      font-size: 1.25rem;
      transition: 0.2s ease;
    }

    .round-btn:hover {
      transform: translateY(-3px);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
      animation: fadeUp 0.65s ease both;
    }

    .progress-shell {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 8px;
      box-shadow: var(--small-shadow);
    }

    .progress-bar {
      width: 0%;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--purple));
      transition: width 0.45s cubic-bezier(.2,.9,.2,1);
    }

    .score-pill {
      background: var(--card);
      border: 2px solid var(--line);
      box-shadow: var(--small-shadow);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      white-space: nowrap;
      font-size: 1.05rem;
    }

    .screen {
      display: none;
      min-height: 620px;
      animation: fadeSlide 0.5s cubic-bezier(.2,.9,.2,1) both;
    }

    .screen.active {
      display: block;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 42px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(88, 204, 2, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(28, 176, 246, 0.12), transparent 30%);
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: center;
    }

    .hero h2,
    .lesson-title,
    .question-title {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.16;
      font-weight: 900;
    }

    .hero p,
    .concept-text,
    .result-text {
      font-size: clamp(1.22rem, 2.4vw, 1.65rem);
      line-height: 2;
      font-weight: 800;
      color: var(--ink);
      margin: 0;
    }

    .hero-art {
      aspect-ratio: 1;
      border-radius: 34px;
      background: linear-gradient(145deg, #d9f99d, #7dd3fc);
      display: grid;
      place-items: center;
      font-size: clamp(5rem, 12vw, 9rem);
      box-shadow: var(--shadow);
      animation: float 3s ease-in-out infinite;
    }

    .lesson-map {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .lesson-node {
      background: var(--soft);
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      text-align: center;
      box-shadow: var(--small-shadow);
      transition: 0.2s ease;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .lesson-node.unlocked {
      background: linear-gradient(145deg, rgba(88,204,2,.18), rgba(28,176,246,.13));
    }

    .lesson-node.locked {
      opacity: 0.58;
      filter: grayscale(0.5);
    }

    .lesson-node:hover.unlocked {
      transform: translateY(-4px);
    }

    .node-icon {
      font-size: 2rem;
    }

    .node-title {
      font-size: 1.08rem;
      font-weight: 900;
      line-height: 1.4;
    }

    .node-status {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 900;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(28,176,246,.12);
      color: var(--blue-dark);
      border: 2px solid rgba(28,176,246,.28);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 1rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    body.dark .pill {
      color: #7dd3fc;
    }

    .concept-card {
      margin-top: 20px;
      background: var(--soft);
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: clamp(20px, 4vw, 38px);
      min-height: 250px;
      display: flex;
      align-items: center;
      box-shadow: inset 0 -4px 0 rgba(15,23,42,.04);
    }

    .button-row {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .btn {
      border-radius: 18px;
      padding: 16px 24px;
      font-size: 1.12rem;
      font-weight: 900;
      color: white;
      background: var(--green);
      box-shadow: 0 7px 0 var(--green-dark);
      transition: 0.12s ease;
      min-width: 170px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .btn.secondary {
      background: var(--blue);
      box-shadow: 0 7px 0 var(--blue-dark);
    }

    .btn.red {
      background: var(--red);
      box-shadow: 0 7px 0 var(--red-dark);
    }

    .btn.gray {
      background: #94a3b8;
      box-shadow: 0 7px 0 #64748b;
    }

    .mini-info {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 900;
    }

    .quiz-layout {
      display: grid;
      gap: 18px;
    }

    .question-card {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 26px;
      padding: clamp(20px, 4vw, 36px);
      box-shadow: var(--shadow);
    }

    .question-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .question-title {
      font-size: clamp(1.55rem, 3.2vw, 2.45rem);
      margin-bottom: 20px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .answer {
      background: var(--soft);
      color: var(--ink);
      border: 3px solid var(--line);
      box-shadow: 0 6px 0 rgba(15,23,42,.08);
      border-radius: 18px;
      padding: 18px;
      font-size: 1.14rem;
      text-align: right;
      transition: 0.15s ease;
      min-height: 74px;
    }

    .answer:hover {
      transform: translateY(-2px);
      border-color: var(--blue);
    }

    .answer.selected {
      border-color: var(--blue);
      background: rgba(28,176,246,.16);
    }

    .answer.correct {
      border-color: var(--green);
      background: rgba(88,204,2,.18);
      animation: bounce 0.45s ease;
    }

    .answer.wrong {
      border-color: var(--red);
      background: rgba(255,75,75,.15);
      animation: shake 0.4s ease;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .match-col {
      display: grid;
      gap: 12px;
    }

    .match-item {
      background: var(--soft);
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 66px;
      font-size: 1.1rem;
      color: var(--ink);
      text-align: center;
      box-shadow: 0 6px 0 rgba(15,23,42,.08);
      transition: 0.15s ease;
    }

    .match-item:hover {
      transform: translateY(-2px);
    }

    .match-item.active {
      border-color: var(--blue);
      background: rgba(28,176,246,.16);
    }

    .match-item.done {
      border-color: var(--green);
      background: rgba(88,204,2,.18);
      opacity: .8;
      pointer-events: none;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      font-size: 1.15rem;
      font-weight: 900;
      display: none;
    }

    .feedback.show {
      display: block;
      animation: fadeUp .25s ease both;
    }

    .feedback.good {
      background: rgba(88,204,2,.18);
      color: var(--green-dark);
      border: 2px solid rgba(88,204,2,.35);
    }

    .feedback.bad {
      background: rgba(255,75,75,.16);
      color: var(--red-dark);
      border: 2px solid rgba(255,75,75,.32);
    }

    body.dark .feedback.good {
      color: #a3e635;
    }

    body.dark .feedback.bad {
      color: #fca5a5;
    }

    .result {
      text-align: center;
    }

    .result-emoji {
      font-size: clamp(5rem, 13vw, 9rem);
      margin-bottom: 10px;
      animation: bounce 1s ease infinite;
    }

    .result h2 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
    }

    .big-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      min-height: 90px;
      border-radius: 30px;
      background: linear-gradient(145deg, var(--green), #9be600);
      color: white;
      font-size: 2.6rem;
      font-weight: 900;
      box-shadow: 0 10px 0 var(--green-dark);
      margin: 20px 0;
    }

    .confetti {
      position: fixed;
      width: 12px;
      height: 18px;
      border-radius: 4px;
      top: -20px;
      animation: confettiFall 1.8s linear forwards;
      z-index: 30;
      pointer-events: none;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(22px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(2deg); }
      50% { transform: translateY(-12px) rotate(-2deg); }
    }

    @keyframes bounce {
      0%,100% { transform: scale(1); }
      40% { transform: scale(1.1); }
      65% { transform: scale(.97); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    @keyframes confettiFall {
      to {
        transform: translateY(105vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 220px;
      }

      .lesson-map {
        grid-template-columns: 1fr;
      }

      .answers,
      .match-grid {
        grid-template-columns: 1fr;
      }

      .hud {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .brand {
        align-items: flex-start;
      }

      .mascot {
        width: 54px;
        height: 54px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mascot">🦉</div>
        <div>
          <h1>رحلة التفوق في الاجتماعيات</h1>
          <p>مراجعة تفاعلية بأسلوب الألعاب للامتحان الجهوي</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="round-btn" id="soundToggle" title="الصوت">🔊</button>
        <button class="round-btn" id="themeToggle" title="الوضع الليلي">🌙</button>
      </div>
    </header>

    <section class="hud">
      <div class="progress-shell">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="score-pill" id="hudText">ابدأ الرحلة</div>
    </section>

    <main id="appRoot"></main>
  </div>

  <audio id="correctAudio" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
  <audio id="wrongAudio" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/946/946-preview.mp3"></audio>
  <audio id="completeAudio" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
  <audio id="clickAudio" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

  <script>
    const lessons = [
      {
        id: 1,
        icon: "📜",
        title: "التاريخ - الكفاح من أجل الاستقلال",
        paragraphs: [
          "المقاومة المسلحة: أحمد الهيبة (سيدي بوعثمان 1912)، موحى أحمو الزياني (الهري 1914)، الخطابي (أنوال 1921)، عسو أوبسلام (بوكافر 1933).",
          "الحركة الوطنية: بدأت بالمطالبة بالإصلاحات (1930) ثم المطالبة بالاستقلال في 11 يناير 1944.",
          "استكمال الوحدة الترابية: طنجة (1956)، طرفاية (1958)، سيدي إفني (1969)، الساقية الحمراء (1975)، واد الذهب (1979).",
          "مصطلحات: الظهير البربري (قانون 1930 للتفريق بين الأمازيغ والعرب)، الحركة الوطنية، الاستقلال."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "متى تم تقديم وثيقة المطالبة بالاستقلال؟",
            answers: ["11 يناير 1944", "16 ماي 1930", "1956", "1975"],
            correct: "11 يناير 1944"
          },
          {
            type: "match",
            prompt: "اربط القائد بالمعركة المناسبة:",
            pairs: [
              ["أحمد الهيبة", "سيدي بوعثمان 1912"],
              ["موحى أحمو الزياني", "الهري 1914"],
              ["الخطابي", "أنوال 1921"],
              ["عسو أوبسلام", "بوكافر 1933"]
            ]
          },
          {
            type: "tf",
            prompt: "بدأت الحركة الوطنية بالمطالبة بالإصلاحات سنة 1930.",
            correct: true
          },
          {
            type: "mcq",
            prompt: "ما هو الظهير البربري؟",
            answers: [
              "قانون 1930 للتفريق بين الأمازيغ والعرب",
              "معركة وقعت سنة 1921",
              "منطقة استرجعها المغرب سنة 1979",
              "برنامج إعلامي تحسيسي"
            ],
            correct: "قانون 1930 للتفريق بين الأمازيغ والعرب"
          },
          {
            type: "mcq",
            prompt: "متى استرجع المغرب واد الذهب؟",
            answers: ["1979", "1975", "1969", "1958"],
            correct: "1979"
          }
        ]
      },
      {
        id: 2,
        icon: "🌍",
        title: "الجغرافيا - نيجيريا والنهج الجغرافي",
        paragraphs: [
          "نيجيريا - الغنى والضعف: غنى طبيعي (بترول، غاز، فلاحة) وضعف تنموي (الرتبة 153، فقر).",
          "العوامل المفسرة: انفجار ديمغرافي، هيمنة الشركات الأجنبية، الفساد، بوكو حرام.",
          "النهج الجغرافي: يعتمد على 3 خطوات بالترتيب: الوصف (تقديم الظاهرة)، التفسير (إبراز العوامل)، التعميم (المقارنة واستخلاص القواعد)."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "ما هي مصادر الغنى الطبيعي في نيجيريا؟",
            answers: ["بترول، غاز، فلاحة", "ثلوج وسياحة جبلية", "صناعة السيارات فقط", "استيراد الطاقة"],
            correct: "بترول، غاز، فلاحة"
          },
          {
            type: "tf",
            prompt: "تحتل نيجيريا الرتبة 153 في مؤشر التنمية حسب الدرس.",
            correct: true
          },
          {
            type: "match",
            prompt: "رتب خطوات النهج الجغرافي بربط كل خطوة بمعناها:",
            pairs: [
              ["الوصف", "تقديم الظاهرة"],
              ["التفسير", "إبراز العوامل"],
              ["التعميم", "المقارنة واستخلاص القواعد"]
            ]
          },
          {
            type: "mcq",
            prompt: "أي عامل من العوامل المفسرة للضعف التنموي في نيجيريا؟",
            answers: ["الفساد", "غياب الموارد الطبيعية", "انعدام السكان", "غياب الفلاحة"],
            correct: "الفساد"
          },
          {
            type: "tf",
            prompt: "بوكو حرام من التهديدات التي تفسر ضعف التنمية في نيجيريا.",
            correct: true
          }
        ]
      },
      {
        id: 3,
        icon: "🕊️",
        title: "المواطنة - حوار الأديان والبرامج الإعلامية",
        paragraphs: [
          "حوار الأديان: لقاءات تواصلية لنشر السلم. من أساليبه: حوارات فردية، جماعية، بالمراسلة. المغرب نموذج للتعايش.",
          "البرنامج الإعلامي: وسيلة للتأثير في الأفراد. أشكاله: مكتوب، مرئي، مسموع. خطوته: التصور (اختيار الموضوع) والتخطيط (صياغة النص)."
        ],
        questions: [
          {
            type: "mcq",
            prompt: "ما تعريف البرنامج الإعلامي؟",
            answers: [
              "وسيلة للتأثير في الأفراد",
              "معركة مسلحة ضد الاستعمار",
              "خطوة من خطوات النهج الجغرافي",
              "قانون للتفريق بين الأمازيغ والعرب"
            ],
            correct: "وسيلة للتأثير في الأفراد"
          },
          {
            type: "match",
            prompt: "اربط نوع البرنامج الإعلامي بمثاله:",
            pairs: [
              ["مكتوب", "مقال"],
              ["مرئي", "فيديو"],
              ["مسموع", "إذاعة"]
            ]
          },
          {
            type: "tf",
            prompt: "من أساليب حوار الأديان: حوارات فردية وجماعية وبالمراسلة.",
            correct: true
          },
          {
            type: "mcq",
            prompt: "ما معنى مرحلة التصور في إعداد البرنامج الإعلامي؟",
            answers: ["اختيار الموضوع", "أنوال 1921", "المقارنة واستخلاص القواعد", "واد الذهب 1979"],
            correct: "اختيار الموضوع"
          },
          {
            type: "tf",
            prompt: "المغرب نموذج للتعايش حسب الدرس.",
            correct: true
          }
        ]
      }
    ];

    const finalQuestions = [
      ...lessons.flatMap(lesson => lesson.questions),
      {
        type: "mcq",
        prompt: "متى استرجع المغرب الساقية الحمراء؟",
        answers: ["1975", "1956", "1930", "1921"],
        correct: "1975"
      },
      {
        type: "mcq",
        prompt: "ما الخطوة الثانية في النهج الجغرافي؟",
        answers: ["التفسير", "الوصف", "التعميم", "التصور"],
        correct: "التفسير"
      },
      {
        type: "tf",
        prompt: "البرنامج الإعلامي قد يكون مكتوبا أو مرئيا أو مسموعا.",
        correct: true
      }
    ];

    const state = {
      screen: "home",
      unlockedLesson: Number(localStorage.getItem("unlockedLesson") || 0),
      completedLessons: JSON.parse(localStorage.getItem("completedLessons") || "[]"),
      currentLesson: 0,
      currentParagraph: 0,
      currentQuestion: 0,
      score: 0,
      quizQuestions: [],
      selectedLeft: null,
      matchCount: 0,
      muted: false,
      answered: false
    };

    const appRoot = document.getElementById("appRoot");
    const progressBar = document.getElementById("progressBar");
    const hudText = document.getElementById("hudText");

    const audio = {
      correct: document.getElementById("correctAudio"),
      wrong: document.getElementById("wrongAudio"),
      complete: document.getElementById("completeAudio"),
      click: document.getElementById("clickAudio")
    };

    function saveProgress() {
      localStorage.setItem("unlockedLesson", String(state.unlockedLesson));
      localStorage.setItem("completedLessons", JSON.stringify(state.completedLessons));
    }

    function play(name) {
      if (state.muted) return;
      const a = audio[name];
      if (!a) return;
      a.currentTime = 0;
      a.volume = name === "wrong" ? 0.28 : name === "complete" ? 0.55 : 0.35;
      a.play().catch(() => {});
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function setScreen(html) {
      appRoot.innerHTML = html;
      bindEvents();
      updateHud();
    }

    function updateHud() {
      let percent = 0;
      let text = "ابدأ الرحلة";

      if (state.screen === "lesson") {
        const lesson = lessons[state.currentLesson];
        percent = ((state.currentParagraph + 1) / lesson.paragraphs.length) * 100;
        text = `درس ${state.currentLesson + 1} • بطاقة ${state.currentParagraph + 1}/${lesson.paragraphs.length}`;
      }

      if (state.screen === "quiz" || state.screen === "final") {
        percent = ((state.currentQuestion) / state.quizQuestions.length) * 100;
        text = `النقطة: ${state.score}/20 • السؤال ${Math.min(state.currentQuestion + 1, state.quizQuestions.length)}/${state.quizQuestions.length}`;
      }

      if (state.screen === "home") {
        percent = (state.completedLessons.length / lessons.length) * 82;
        text = `الدروس المكتملة: ${state.completedLessons.length}/${lessons.length}`;
      }

      if (state.screen === "result") {
        percent = state.score >= 18 ? 100 : 50;
        text = `النتيجة: ${state.score}/20`;
      }

      progressBar.style.width = `${Math.min(100, Math.round(percent))}%`;
      hudText.textContent = text;
    }

    function renderHome() {
      state.screen = "home";
      const finalUnlocked = state.completedLessons.length === lessons.length;

      setScreen(`
        <section class="screen active">
          <div class="card hero">
            <div>
              <span class="pill">🎮 نظام التقدم: خاصك 18/20 باش تدوز</span>
              <h2>راجع، جاوب، وفتح المرحلة الجاية!</h2>
              <p>
                تعلم المفاهيم الأساسية في التاريخ والجغرافيا والتربية على المواطنة عبر بطاقات قصيرة،
                ثم اختبر نفسك بأسئلة مثل الاختيار من متعدد، صح أو خطأ، والمطابقة.
              </p>

              <div class="lesson-map">
                ${lessons.map((lesson, index) => {
                  const completed = state.completedLessons.includes(index);
                  const unlocked = index <= state.unlockedLesson;
                  return `
                    <button class="lesson-node ${unlocked ? "unlocked" : "locked"}" data-start="${index}" ${unlocked ? "" : "disabled"}>
                      <div class="node-icon">${completed ? "✅" : unlocked ? lesson.icon : "🔒"}</div>
                      <div class="node-title">${lesson.title}</div>
                      <div class="node-status">${completed ? "مكتمل" : unlocked ? "مفتوح" : "مقفل"}</div>
                    </button>
                  `;
                }).join("")}

                <button class="lesson-node ${finalUnlocked ? "unlocked" : "locked"}" data-final="true" ${finalUnlocked ? "" : "disabled"}>
                  <div class="node-icon">${finalUnlocked ? "👑" : "🔒"}</div>
                  <div class="node-title">Final Boss - الامتحان النهائي</div>
                  <div class="node-status">${finalUnlocked ? "جاهز" : "أكمل جميع الدروس"}</div>
                </button>
              </div>
            </div>
            <div class="hero-art">🏆</div>
          </div>
        </section>
      `);
    }

    function startLesson(index) {
      play("click");
      state.screen = "lesson";
      state.currentLesson = index;
      state.currentParagraph = 0;
      state.score = 0;
      state.currentQuestion = 0;
      state.answered = false;
      renderLesson();
    }

    function renderLesson() {
      const lesson = lessons[state.currentLesson];
      const paragraph = lesson.paragraphs[state.currentParagraph];

      setScreen(`
        <section class="screen active">
          <div class="card">
            <span class="pill">${lesson.icon} الدرس ${state.currentLesson + 1}</span>
            <h2 class="lesson-title">${lesson.title}</h2>

            <div class="concept-card">
              <p class="concept-text">${paragraph}</p>
            </div>

            <div class="button-row">
              <span class="mini-info">اقرأ البطاقة مزيان، من بعد دوز للبطاقة التالية.</span>
              <button class="btn" data-next-paragraph>
                ${state.currentParagraph === lesson.paragraphs.length - 1 ? "بدا الاختبار" : "التالي"}
              </button>
            </div>
          </div>
        </section>
      `);
    }

    function nextParagraph() {
      play("click");
      const lesson = lessons[state.currentLesson];

      if (state.currentParagraph < lesson.paragraphs.length - 1) {
        state.currentParagraph++;
        renderLesson();
      } else {
        startQuiz(false);
      }
    }

    function startQuiz(isFinal) {
      state.screen = isFinal ? "final" : "quiz";
      state.quizQuestions = isFinal ? pickFinalQuestions() : lessons[state.currentLesson].questions;
      state.currentQuestion = 0;
      state.score = 0;
      state.answered = false;
      state.selectedLeft = null;
      state.matchCount = 0;
      renderQuestion();
    }

    function pickFinalQuestions() {
      return shuffle(finalQuestions).slice(0, 10);
    }

    function pointsPerQuestion() {
      return 20 / state.quizQuestions.length;
    }

    function addPoint() {
      state.score = Math.min(20, Math.round((state.score + pointsPerQuestion()) * 10) / 10);
    }

    function normalizedScore() {
      return Math.round(state.score);
    }

    function renderQuestion() {
      const q = state.quizQuestions[state.currentQuestion];
      state.answered = false;
      state.selectedLeft = null;
      state.matchCount = 0;

      if (!q) {
        state.score = normalizedScore();
        renderResult();
        return;
      }

      let content = "";

      if (q.type === "mcq") {
        content = `
          <div class="answers">
            ${shuffle(q.answers).map(answer => `
              <button class="answer" data-answer="${escapeHtml(answer)}">${answer}</button>
            `).join("")}
          </div>
        `;
      }

      if (q.type === "tf") {
        content = `
          <div class="answers">
            <button class="answer" data-tf="true">صحيح ✅</button>
            <button class="answer" data-tf="false">خطأ ❌</button>
          </div>
        `;
      }

      if (q.type === "match") {
        const left = shuffle(q.pairs.map(p => p[0]));
        const right = shuffle(q.pairs.map(p => p[1]));
        content = `
          <p class="mini-info">اختار عنصرا من العمود الأول، ثم اختار الجواب المناسب من العمود الثاني.</p>
          <div class="match-grid">
            <div class="match-col">
              ${left.map(item => `<button class="match-item" data-left="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
            <div class="match-col">
              ${right.map(item => `<button class="match-item" data-right="${escapeHtml(item)}">${item}</button>`).join("")}
            </div>
          </div>
        `;
      }

      setScreen(`
        <section class="screen active">
          <div class="quiz-layout">
            <div class="question-card">
              <div class="question-top">
                <span class="pill">${state.screen === "final" ? "👑 الامتحان النهائي" : "🧠 اختبار الدرس"}</span>
                <span class="score-pill">النقطة الحالية: ${state.score}/20</span>
              </div>

              <h2 class="question-title">${q.prompt}</h2>
              ${content}

              <div class="feedback" id="feedback"></div>

              <div class="button-row">
                <button class="btn gray" data-home>الرئيسية</button>
                <button class="btn secondary" id="continueBtn" data-continue style="display:none;">تابع</button>
              </div>
            </div>
          </div>
        </section>
      `);
    }

    function answerMCQ(value, btn) {
      if (state.answered) return;
      state.answered = true;

      const q = state.quizQuestions[state.currentQuestion];
      const correct = value === q.correct;

      document.querySelectorAll(".answer").forEach(el => {
        if (el.dataset.answer === q.correct) el.classList.add("correct");
        else if (el === btn && !correct) el.classList.add("wrong");
        el.disabled = true;
      });

      finishAnswer(correct, correct ? "ممتاز! جواب صحيح." : `قريب! الجواب الصحيح هو: ${q.correct}`);
    }

    function answerTF(value, btn) {
      if (state.answered) return;
      state.answered = true;

      const q = state.quizQuestions[state.currentQuestion];
      const chosen = value === "true";
      const correct = chosen === q.correct;

      document.querySelectorAll(".answer").forEach(el => {
        const val = el.dataset.tf === "true";
        if (val === q.correct) el.classList.add("correct");
        else if (el === btn && !correct) el.classList.add("wrong");
        el.disabled = true;
      });

      finishAnswer(correct, correct ? "رائع! إجابة صحيحة." : "انتبه! راجع البطاقة السابقة.");
    }

    function handleMatch(btn) {
      const q = state.quizQuestions[state.currentQuestion];

      if (btn.dataset.left) {
        document.querySelectorAll("[data-left]").forEach(el => el.classList.remove("active"));
        btn.classList.add("active");
        state.selectedLeft = btn;
        play("click");
        return;
      }

      if (btn.dataset.right && state.selectedLeft) {
        const leftValue = state.selectedLeft.dataset.left;
        const rightValue = btn.dataset.right;
        const valid = q.pairs.some(pair => pair[0] === leftValue && pair[1] === rightValue);

        if (valid) {
          state.selectedLeft.classList.remove("active");
          state.selectedLeft.classList.add("done");
          btn.classList.add("done");
          state.selectedLeft.disabled = true;
          btn.disabled = true;
          state.selectedLeft = null;
          state.matchCount++;
          play("correct");

          if (state.matchCount === q.pairs.length) {
            finishAnswer(true, "ممتاز! جميع المطابقات صحيحة.");
          }
        } else {
          btn.classList.add("wrong");
          state.selectedLeft.classList.add("wrong");
          play("wrong");
          setTimeout(() => {
            btn.classList.remove("wrong");
            if (state.selectedLeft) state.selectedLeft.classList.remove("wrong");
          }, 450);
        }
      }
    }

    function finishAnswer(correct, message) {
      const feedback = document.getElementById("feedback");
      feedback.className = `feedback show ${correct ? "good" : "bad"}`;
      feedback.textContent = message;

      if (correct) {
        addPoint();
        play("correct");
      } else {
        play("wrong");
      }

      document.getElementById("continueBtn").style.display = "inline-block";
      updateHud();
    }

    function continueQuiz() {
      play("click");
      state.currentQuestion++;
      renderQuestion();
    }

    function renderResult() {
      state.screen = "result";
      const passed = state.score >= 18;
      const final = state.quizQuestions.length === pickFinalQuestions.length;
      const isFinal = state.currentLesson === -1;

      if (passed) {
        play("complete");
        confetti();
      } else {
        play("wrong");
      }

      if (passed && !isFinal) {
        if (!state.completedLessons.includes(state.currentLesson)) {
          state.completedLessons.push(state.currentLesson);
        }
        state.unlockedLesson = Math.max(state.unlockedLesson, Math.min(lessons.length - 1, state.currentLesson + 1));
        saveProgress();
      }

      setScreen(`
        <section class="screen active">
          <div class="card result">
            <div class="result-emoji">${passed ? (isFinal ? "👑" : "🎉") : "💪"}</div>
            <h2>${passed ? (isFinal ? "ربحت اللعبة!" : "نجحت وفتحت المرحلة الجاية!") : "مازال خاصك محاولة أخرى"}</h2>

            <div class="big-score">${state.score}/20</div>

            <p class="result-text">
              ${
                passed
                  ? isFinal
                    ? "ممتاز! كملتي جميع الدروس ونجحتي في الامتحان النهائي."
                    : "النقطة ديالك 18 أو أكثر. المرحلة التالية ولات مفتوحة."
                  : "خاصك تجيب 18/20 على الأقل. رجع للدرس وعاود المحاولة باش ترسخ المعلومات."
              }
            </p>

            <div class="button-row" style="justify-content:center;">
              ${
                passed
                  ? `<button class="btn" data-home>الرجوع لخريطة الدروس</button>`
                  : `<button class="btn red" data-retry>إعادة الدرس والاختبار</button>`
              }
            </div>
          </div>
        </section>
      `);
    }

    function renderFinalIntro() {
      play("click");
      state.currentLesson = -1;
      setScreen(`
        <section class="screen active">
          <div class="card hero">
            <div>
              <span class="pill">👑 Final Boss</span>
              <h2>الامتحان النهائي</h2>
              <p>
                الآن غادي تختبر جميع المفاهيم: التاريخ، الجغرافيا، والتربية على المواطنة.
                خاصك تجيب أكثر من 18/20 باش تربح اللعبة.
              </p>
              <div class="button-row">
                <button class="btn" data-start-final>ابدأ الامتحان النهائي</button>
                <button class="btn gray" data-home>الرئيسية</button>
              </div>
            </div>
            <div class="hero-art">👑</div>
          </div>
        </section>
      `);
    }

    function retryLesson() {
      play("click");
      const retryIndex = state.currentLesson === -1 ? 0 : state.currentLesson;
      if (state.currentLesson === -1) {
        renderFinalIntro();
      } else {
        startLesson(retryIndex);
      }
    }

    function confetti() {
      const colors = ["#58cc02", "#1cb0f6", "#ffc800", "#ff4b4b", "#ce82ff"];
      for (let i = 0; i < 52; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.8 + "s";
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2600);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function bindEvents() {
      document.querySelectorAll("[data-start]").forEach(btn => {
        btn.addEventListener("click", () => startLesson(Number(btn.dataset.start)));
      });

      document.querySelectorAll("[data-final]").forEach(btn => {
        btn.addEventListener("click", renderFinalIntro);
      });

      document.querySelectorAll("[data-next-paragraph]").forEach(btn => {
        btn.addEventListener("click", nextParagraph);
      });

      document.querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => answerMCQ(btn.dataset.answer, btn));
      });

      document.querySelectorAll("[data-tf]").forEach(btn => {
        btn.addEventListener("click", () => answerTF(btn.dataset.tf, btn));
      });

      document.querySelectorAll(".match-item").forEach(btn => {
        btn.addEventListener("click", () => handleMatch(btn));
      });

      document.querySelectorAll("[data-continue]").forEach(btn => {
        btn.addEventListener("click", continueQuiz);
      });

      document.querySelectorAll("[data-home]").forEach(btn => {
        btn.addEventListener("click", () => {
          play("click");
          renderHome();
        });
      });

      document.querySelectorAll("[data-retry]").forEach(btn => {
        btn.addEventListener("click", retryLesson);
      });

      document.querySelectorAll("[data-start-final]").forEach(btn => {
        btn.addEventListener("click", () => {
          play("click");
          state.currentLesson = -1;
          startQuiz(true);
        });
      });
    }

    document.getElementById("soundToggle").addEventListener("click", () => {
      state.muted = !state.muted;
      document.getElementById("soundToggle").textContent = state.muted ? "🔇" : "🔊";
      if (!state.muted) play("click");
    });

    document.getElementById("themeToggle").addEventListener("click", () => {
      play("click");
      document.body.classList.toggle("dark");
      document.getElementById("themeToggle").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });

    renderHome();
  </script>
</body>
</html>
